<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 392 112" width="392" height="112"
     role="img" aria-label="Mason Law, P.C. — California Trial Attorneys">
  <title>Mason Law, P.C.</title>
  <style>
    .ml-beam {
      transform-box: view-box;
      transform-origin: 56px 92px;
      animation: ml-balance 5s ease-in-out infinite;
    }
    @keyframes ml-balance {
      0%, 100% { transform: rotate(-2deg); }
      50%      { transform: rotate(2deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ml-beam { animation: none; transform: none; }
    }
    .ml-mono { font-family: Georgia, 'Times New Roman', 'Playfair Display', serif; font-weight: 700; }
    .ml-name { font-family: Georgia, 'Times New Roman', 'Playfair Display', serif; font-weight: 700; }
    .ml-tag  { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; font-weight: 500; }
  </style>

  <!-- ================= EMBLEM: shield + monogram + scales ================= -->
  <g>
    <path d="M22 26 L90 26 L90 58 C90 84 74 99 56 106 C38 99 22 84 22 58 Z"
          fill="rgba(232,201,126,0.06)" stroke="#E8C97E" stroke-width="2.4" stroke-linejoin="round"/>
    <path d="M32 33 L80 33" stroke="#E8C97E" stroke-width="1.6" stroke-linecap="round" opacity="0.95"/>
    <text class="ml-mono" x="56" y="80" text-anchor="middle" font-size="48" letter-spacing="0.5" fill="#F4E9D0">M</text>
    <g class="ml-beam">
      <line x1="44" y1="90" x2="68" y2="90" stroke="#E8C97E" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="44" cy="90" r="1.9" fill="#E8C97E"/>
      <circle cx="68" cy="90" r="1.9" fill="#E8C97E"/>
      <circle cx="56" cy="90" r="1.6" fill="#F4E9D0"/>
    </g>
  </g>

  <!-- ================= WORDMARK ================= -->
  <text class="ml-name" x="112" y="60" font-size="41" letter-spacing="1.2" fill="#E2E8F0">MASON LAW</text>
  <path d="M113 71 L250 71" stroke="#E8C97E" stroke-width="2.4" stroke-linecap="round"/>
  <text class="ml-tag" x="113" y="90" font-size="10.5" letter-spacing="1.4" fill="#E2E8F0" opacity="0.8">P.C.  &#183;  CALIFORNIA TRIAL ATTORNEYS</text>
</svg>
